<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TodoList - API REST</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 800px;
        margin: 0 auto;
      }

      h1 {
        text-align: center;
        color: white;
        margin-bottom: 30px;
        font-size: 2.5em;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
      }

      .todo-form {
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        margin-bottom: 30px;
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        font-weight: 600;
        color: #333;
      }

      input[type="text"],
      textarea {
        width: 100%;
        padding: 12px;
        border: 2px solid #e0e0e0;
        border-radius: 5px;
        font-size: 14px;
        transition: border-color 0.3s;
      }

      input[type="text"]:focus,
      textarea:focus {
        outline: none;
        border-color: #667eea;
      }

      textarea {
        resize: vertical;
        min-height: 80px;
      }

      .btn {
        padding: 12px 24px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.3s;
      }

      .btn-primary {
        background: #667eea;
        color: white;
        width: 100%;
      }

      .btn-primary:hover {
        background: #5568d3;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
      }

      .btn-success {
        background: #48bb78;
        color: white;
        padding: 8px 16px;
        font-size: 12px;
      }

      .btn-danger {
        background: #f56565;
        color: white;
        padding: 8px 16px;
        font-size: 12px;
      }

      .btn-edit {
        background: #ed8936;
        color: white;
        padding: 8px 16px;
        font-size: 12px;
      }

      .todos-list {
        display: grid;
        gap: 15px;
      }

      .todo-item {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        transition: transform 0.3s;
      }

      .todo-item:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }

      .todo-item.completed {
        opacity: 0.7;
      }

      .todo-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .todo-title {
        font-size: 1.2em;
        font-weight: 600;
        color: #333;
      }

      .todo-item.completed .todo-title {
        text-decoration: line-through;
        color: #999;
      }

      .todo-description {
        color: #666;
        margin-bottom: 15px;
        line-height: 1.5;
      }

      .todo-actions {
        display: flex;
        gap: 10px;
      }

      .todo-date {
        font-size: 0.85em;
        color: #999;
        margin-top: 10px;
      }

      .status-badge {
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.85em;
        font-weight: 600;
      }

      .status-pending {
        background: #fed7d7;
        color: #c53030;
      }

      .status-completed {
        background: #c6f6d5;
        color: #2f855a;
      }

      .loading {
        text-align: center;
        color: white;
        font-size: 1.2em;
        margin: 50px 0;
      }

      .empty-state {
        text-align: center;
        color: white;
        font-size: 1.2em;
        margin: 50px 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>📝 Ma TodoList</h1>

      <div class="todo-form">
        <form id="todoForm">
          <div class="form-group">
            <label for="title">Titre *</label>
            <input type="text" id="title" name="title" required />
          </div>
          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description"></textarea>
          </div>
          <button type="submit" class="btn btn-primary">
            Ajouter la tâche
          </button>
        </form>
      </div>

      <div id="todosContainer">
        <div class="loading">Chargement des tâches...</div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
